<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard +</title>
    <link id="favicon" rel="icon" type="image/png" href="https://teaching.utoronto.ca/wp-content/uploads/canvas-logo-1024x1020-1.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #fafafa; 
            --primary: #E33E2B; 
            --text: #202124; 
            --text-light: #5f6368;
            --card: #ffffff; 
            --border: #eaebed; 
            --radius: 16px;
            --urgent: #d9534f;
            --upcoming: #f0ad4e;
            --future: #5cb85c;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            font-weight: 300; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            line-height: 1.5;
            min-height: 100vh;
        }

        .loading-bar-container {
            width: 100%; height: 4px; background: transparent;
            position: fixed; top: 0; left: 0; z-index: 2000; overflow: hidden; display: none;
        }
        .loading-bar {
            width: 50%; height: 100%; background: var(--primary);
            position: absolute; left: -50%;
            animation: loading-animation 0.7s infinite ease-in-out;
        }
        @keyframes loading-animation {
            0% { left: -50%; width: 10%; }
            20% { width: 60%; }
            50% { width: 40%; }
            80% { width: 20%; }
            100% { left: 100%; width: 10%; }
        }
        
        .dashboard-container { width: 100%; max-width: 1200px; flex-grow: 1; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { height: 45px; border-radius: 8px; }
        .top-bar h1 { margin: 0; font-weight: 400; font-size: 1.8em; letter-spacing: -0.5px; }
        
        .settings-btn { 
            background: white; color: var(--text-light); border: 1px solid var(--border); 
            padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: 400; 
            font-family: 'Inter', sans-serif; transition: 0.2s;
        }
        .settings-btn:hover { border-color: #ccc; color: var(--text); }

        .controls-card { 
            background: var(--card); padding: 30px; border-radius: var(--radius); 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            margin-bottom: 40px; transition: all 0.3s ease; 
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 0.9em; color: var(--text-light); }
        input[type="text"], input[type="password"] { 
            width: 100%; padding: 14px; border: 1px solid var(--border); 
            border-radius: 8px; box-sizing: border-box; font-size: 16px; 
            font-family: 'Inter', sans-serif; font-weight: 300; background: #fdfdfd;
        }
        input:focus { outline: none; border-color: var(--primary); }
        button.action-btn { 
            background-color: var(--primary); color: white; border: none; 
            padding: 14px 24px; font-size: 16px; border-radius: 8px; 
            cursor: pointer; font-weight: 500; width: 100%; 
            transition: opacity 0.2s; 
        }
        button.action-btn:hover { opacity: 0.9; }
        .error { color: #d9534f; margin-top: 15px; font-weight: 500; text-align: center; font-size: 0.9em; }
        
        .app-layout { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: -5px; padding: 0 5px; }
        .section-title { margin: 0; font-weight: 500; font-size: 1.1em; color: var(--text); }
        .toggle-btn { 
            background: none; border: 1px solid var(--border); border-radius: 6px; 
            padding: 6px 12px; cursor: pointer; font-family: 'Inter', sans-serif; 
            font-size: 0.85em; color: var(--text-light); transition: all 0.2s; 
        }
        .toggle-btn:hover { background: #f0f0f0; }
        
        .course-nav {
            display: flex; flex-wrap: wrap; gap: 12px; width: 100%; padding-bottom: 10px;
        }
        .nav-item { 
            background: var(--card); border-radius: 12px; border: 2px solid var(--border); 
            padding: 15px; cursor: pointer; transition: all 0.2s; 
            flex: 1; min-width: 180px; display: flex; flex-direction: column;
        }
        .nav-item:hover { border-color: #ddd; transform: translateY(-2px); }
        .nav-item.active { border-color: var(--primary); background: #fff; box-shadow: 0 4px 15px rgba(227,62,43,0.1); }
        .nav-title { margin: 0 0 10px 0; font-weight: 500; font-size: 1em; }
        .nav-title strong { font-weight: 700; }
        .nav-meta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .course-grade { font-size: 0.85em; font-weight: 500; color: var(--primary); background: rgba(227,62,43,0.08); padding: 4px 10px; border-radius: 20px; }
        .due-badge { font-size: 0.7em; background: #fff3e0; padding: 2px 8px; border-radius: 12px; color: #c96f0e; }
        
        .main-view {
            background: var(--card); border-radius: var(--radius); 
            border: 1px solid var(--border); overflow: hidden; min-height: 500px;
        }
        .course-pane { display: none; }
        .course-pane.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .pane-header { padding: 25px; border-bottom: 1px solid var(--border); background: #fafafa; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .pane-header h2 { margin: 0; font-size: 1.5em; font-weight: 400; }
        .pane-header h2 strong { font-weight: 700; }
        .pane-grade { font-size: 1.1em; font-weight: 500; color: var(--primary); background: rgba(227,62,43,0.08); padding: 6px 14px; border-radius: 40px; }
        
        .course-tabs { display: flex; background: #fdfdfd; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn { 
            flex: 1; padding: 14px 20px; border: none; background: none; cursor: pointer; 
            font-family: 'Inter', sans-serif; font-size: 0.95em; font-weight: 400; 
            color: var(--text-light); border-bottom: 2px solid transparent; white-space: nowrap;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: 500; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        
        .ai-insight-card {
            background: linear-gradient(135deg, #fff8f5 0%, #ffffff 100%);
            border-left: 4px solid var(--primary);
            padding: 20px 24px;
            margin-bottom: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .ai-insight-card h4 { margin: 0 0 12px 0; font-weight: 600; color: var(--primary); }
        .ai-bullets { margin: 8px 0 0 20px; padding-left: 0; }
        .ai-bullets li { margin: 8px 0; line-height: 1.5; font-size: 0.95em; }
        .ai-bullets li strong { font-weight: 700; color: #2c3e4e; }
        
        .upcoming-list, .module-list, .grades-list { list-style: none; padding: 0; margin: 0; }
        .assignment-item { 
            padding: 16px 20px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; transition: background 0.2s;
        }
        .assignment-item:hover { background-color: #fcfcfc; }
        .assignment-info { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .assignment-name { font-weight: 500; color: var(--text); }
        .assignment-date { font-size: 0.75em; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .date-badge { padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .date-urgent { background: #fee2e2; color: #b91c1c; }
        .date-upcoming { background: #fff3e0; color: #c96f0e; }
        .date-future { background: #e6f7e6; color: #2e7d32; }
        .assignment-score { font-weight: 500; background: #f1f3f4; padding: 6px 12px; border-radius: 6px; white-space: nowrap; font-size: 0.85em; }
        .status-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; background: #e9ecef; }
        .module-header { padding: 12px 20px; background: #f8f9fa; font-weight: 600; font-size: 0.9em; border-bottom: 1px solid var(--border); }
        .module-item { padding: 12px 20px 12px 35px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-light); font-size: 0.9em; transition: background 0.2s; }
        .module-item:hover { background: #fcfcfc; color: var(--primary); }
        .module-type { font-size: 0.7em; background: #eee; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
        .no-data { padding: 40px; text-align: center; color: var(--text-light); }
        .grade-summary-header { padding: 16px 20px; background: rgba(227,62,43,0.04); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .big-grade { font-size: 1.3em; font-weight: 600; color: var(--primary); }
        
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); 
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; border-radius: var(--radius); max-width: 600px; width: 90%; padding: 30px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; background: none; border: none; }
        .modal-title { margin-top: 0; }
        footer { margin-top: 50px; text-align: center; color: var(--text-light); font-size: 0.85em; }
    </style>
</head>
<body>
    <div id="loadingBarContainer" class="loading-bar-container"><div class="loading-bar"></div></div>
    <div class="dashboard-container">
        <div class="top-bar">
            <div class="logo-area"><img id="dynamicLogo" src="https://teaching.utoronto.ca/wp-content/uploads/canvas-logo-1024x1020-1.png"><h1>Dashboard PRO</h1></div>
            <button class="settings-btn" onclick="toggleSettings()">Settings</button>
        </div>
        <div id="controlsCard" class="controls-card">
            <div class="input-group"><label>Canvas Domain</label><input type="text" id="canvasDomain" placeholder="cuhsd.instructure.com"></div>
            <div class="input-group"><label>Canvas Token</label><input type="password" id="apiToken" placeholder="Paste Canvas token"></div>
            <div class="input-group"><label>OpenRouter API Key</label><input type="password" id="openRouterKey" placeholder="sk-or-v1-... (for AI due date analysis)"></div>
            <button id="fetchBtn" class="action-btn" onclick="loadEverything()">🚀 Connect & Get AI Due Date Analysis</button>
            <div id="errorMessage" class="error"></div>
        </div>
        <div id="results"></div>
    </div>
    <div id="assignmentModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()"><button class="close-btn" onclick="closeModal(true)">&times;</button><h2 id="modalTitle" class="modal-title"></h2><div id="modalBody"></div><a id="modalSubmitLink" href="#" target="_blank" class="action-btn" style="display:inline-block; text-align:center; margin-top:20px; text-decoration:none;">Open in Canvas</a></div>
    </div>
    <footer><p>📅 Assignments sorted by due date • AI prioritizes upcoming deadlines • Bold formatting supported</p></footer>
    <script>
        const WORKER_URL = 'https://canvas-proxy.567394.workers.dev/';

        function boldCourseName(courseName) {
            const escaped = courseName.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            return `<strong>${escaped}</strong>`;
        }

        function formatBoldText(text) {
            if (!text) return text;
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('canvasDomain').value = localStorage.getItem('canvasDomain') || 'cuhsd.instructure.com';
            document.getElementById('apiToken').value = localStorage.getItem('apiToken') || '';
            document.getElementById('openRouterKey').value = localStorage.getItem('openRouterKey') || '';
            if (localStorage.getItem('apiToken')) loadEverything();
        });

        function toggleSettings() { const card = document.getElementById('controlsCard'); card.style.display = (card.style.display === 'none') ? 'block' : 'none'; }
        function toggleCourseNav() { const nav = document.getElementById('courseNav'); const btn = document.getElementById('toggleNavBtn'); if (nav.style.display === 'none') { nav.style.display = 'flex'; btn.innerText = 'Hide Courses'; } else { nav.style.display = 'none'; btn.innerText = 'Show Courses'; } }
        function selectCourse(courseId) { document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); document.getElementById(`nav-item-${courseId}`)?.classList.add('active'); document.querySelectorAll('.course-pane').forEach(p=>p.classList.remove('active')); document.getElementById(`pane-${courseId}`)?.classList.add('active'); }
        function switchTab(event, courseId, tabName) { const pane = document.getElementById(`pane-${courseId}`); pane.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active')); pane.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); event.target.classList.add('active'); document.getElementById(`tab-${tabName}-${courseId}`).classList.add('active'); }

        async function fetchFromCanvas(endpoint, token, domain) { const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, domain, endpoint }) }); if (!res.ok) throw new Error(`Proxy error ${res.status}`); const data = await res.json(); if (data.errors) throw new Error(data.errors[0]?.message || "Canvas error"); return data; }

        async function getAIDueDateAnalysis(openRouterKey, coursesWithDueDates) {
            if (!openRouterKey || coursesWithDueDates.length === 0) return null;
            const prompt = `You are an academic advisor focused purely on due dates. The student has upcoming future assignments (not overdue) ordered by due date (closest first). For each course, list the assignment with the closest due date. Format as bullet points where each line starts with "- **CourseName**: AssignmentName (Due: Month Day, Year)". Order the bullet points by due date (soonest first). Only mention assignments that are in the future. Focus strictly on deadlines. Here is the data (assignments already sorted by due date): ${JSON.stringify(coursesWithDueDates)}`;
            try {
                const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'ai', openRouterKey: openRouterKey.trim(), courseName: "due_date_analysis", prompt: prompt }) });
                const result = await res.json();
                if (result.aiResponse) return result.aiResponse;
                return null;
            } catch(e) { console.warn("AI error", e); return null; }
        }

        async function loadEverything() {
            const domain = document.getElementById('canvasDomain').value.trim();
            const token = document.getElementById('apiToken').value.trim();
            const openRouterKey = document.getElementById('openRouterKey').value.trim();
            const resultsDiv = document.getElementById('results');
            const errorDiv = document.getElementById('errorMessage');
            const btn = document.getElementById('fetchBtn');
            const loadingBar = document.getElementById('loadingBarContainer');
            if (!token) { errorDiv.innerText = "Canvas token required."; return; }
            localStorage.setItem('canvasDomain', domain); localStorage.setItem('apiToken', token); localStorage.setItem('openRouterKey', openRouterKey);
            document.getElementById('controlsCard').style.display = 'none';
            resultsDiv.innerHTML = ''; errorDiv.innerHTML = '';
            btn.innerText = "Loading Courses..."; btn.disabled = true;
            loadingBar.style.display = 'block';
            try {
                const courses = await fetchFromCanvas('/api/v1/courses?enrollment_state=active&include[]=total_scores&include[]=current_grading_period_scores&per_page=100', token, domain);
                if (!courses.length) throw new Error("No active courses.");
                
                resultsDiv.innerHTML = `<div class="app-layout"><div class="nav-controls"><h3 class="section-title">📚 Your Courses</h3><button class="toggle-btn" onclick="toggleCourseNav()" id="toggleNavBtn">Hide Courses</button></div><div class="course-nav" id="courseNav"></div><div class="main-view" id="mainView"><div id="emptySelection" style="padding:60px; text-align:center;">Select a class to see details</div></div></div>`;
                const courseNav = document.getElementById('courseNav');
                const mainView = document.getElementById('mainView');
                let allUpcomingAssignments = [];
                
                for (const course of courses) {
                    if (!course.name || course.access_restricted_by_date) continue;
                    let rawScore = null;
                    if (course.enrollments && course.enrollments.length > 0) {
                        const enroll = course.enrollments[0];
                        rawScore = enroll.current_period_computed_current_score ?? enroll.computed_current_score;
                    }
                    const courseGrade = (rawScore !== null && rawScore !== undefined) ? `${rawScore.toFixed(2)}%` : "N/A";
                    
                    let allAssignments = [];
                    try { allAssignments = await fetchFromCanvas(`/api/v1/courses/${course.id}/assignments?include[]=submission&include[]=submission_score&per_page=100`, token, domain); } catch(e) { allAssignments = []; }
                    
                    const now = new Date();
                    now.setHours(0, 0, 0, 0);
                    
                    // FIX: Only count FUTURE assignments (due date > today) for the badge
                    // Pending future assignments: not graded, not submitted, has due date, and due date is in the future (not today or past)
                    const futurePendingAssignments = allAssignments.filter(a => {
                        if (!a.due_at) return false;
                        const dueDate = new Date(a.due_at);
                        dueDate.setHours(0, 0, 0, 0);
                        const sub = a.submission;
                        const isGraded = sub && (sub.workflow_state === 'graded' || (sub.score !== null && sub.score !== undefined));
                        const isSubmitted = sub && (sub.workflow_state === 'submitted' || sub.workflow_state === 'pending_review');
                        // Only include if NOT graded, NOT submitted, and due date is strictly in the future (after today)
                        return !isGraded && !isSubmitted && dueDate > now;
                    }).sort((a,b) => new Date(a.due_at) - new Date(b.due_at));
                    
                    // For display in the assignments tab: show all pending including overdue (so student sees overdue tasks)
                    const allPendingForDisplay = allAssignments.filter(a => {
                        if (!a.due_at) return false;
                        const sub = a.submission;
                        const isGraded = sub && (sub.workflow_state === 'graded' || (sub.score !== null && sub.score !== undefined));
                        const isSubmitted = sub && (sub.workflow_state === 'submitted' || sub.workflow_state === 'pending_review');
                        return !isGraded && !isSubmitted && a.due_at;
                    }).sort((a,b) => new Date(a.due_at) - new Date(b.due_at));
                    
                    // For AI: only future assignments (not overdue)
                    futurePendingAssignments.forEach(assign => {
                        allUpcomingAssignments.push({
                            courseName: course.name,
                            assignmentName: assign.name,
                            dueDate: assign.due_at,
                            pointsPossible: assign.points_possible
                        });
                    });
                    
                    const boldName = boldCourseName(course.name);
                    const navItem = document.createElement('div');
                    navItem.className = 'nav-item'; navItem.id = `nav-item-${course.id}`;
                    navItem.onclick = () => selectCourse(course.id);
                    // Badge now shows only FUTURE pending assignments count
                    navItem.innerHTML = `<h2 class="nav-title">${boldName}</h2><div class="nav-meta"><div class="course-grade">${courseGrade}</div><div class="due-badge">📅 ${futurePendingAssignments.length} upcoming</div></div>`;
                    courseNav.appendChild(navItem);
                    
                    const coursePane = document.createElement('div'); coursePane.className = 'course-pane'; coursePane.id = `pane-${course.id}`;
                    coursePane.innerHTML = `
                        <div class="pane-header"><h2>${boldName}</h2><div class="pane-grade">Current: ${courseGrade}</div></div>
                        <div class="course-tabs">
                            <button class="tab-btn active" onclick="switchTab(event, '${course.id}', 'assignments')">Assignments & Tasks</button>
                            <button class="tab-btn" onclick="switchTab(event, '${course.id}', 'modules')">Modules & Materials</button>
                            <button class="tab-btn" onclick="switchTab(event, '${course.id}', 'grades')">Grades</button>
                        </div>
                        <div id="tab-assignments-${course.id}" class="tab-content active"><ul class="upcoming-list" id="assignments-list-${course.id}"></ul></div>
                        <div id="tab-modules-${course.id}" class="tab-content"><ul class="module-list" id="modules-list-${course.id}"><li class="no-data">Loading modules...</li></ul></div>
                        <div id="tab-grades-${course.id}" class="tab-content"><div class="grade-summary-header"><span>Assignment Grades</span><span class="big-grade">Overall: ${courseGrade}</span></div><ul class="grades-list" id="grades-list-${course.id}"></ul></div>
                    `;
                    mainView.appendChild(coursePane);
                    
                    // Assignments tab: show all pending (including overdue) so student sees everything they need to complete
                    const assignContainer = document.getElementById(`assignments-list-${course.id}`);
                    assignContainer.innerHTML = '';
                    if (allPendingForDisplay.length === 0) {
                        assignContainer.innerHTML = '<li class="no-data">✅ No pending assignments! All caught up.</li>';
                    } else {
                        allPendingForDisplay.forEach(assign => {
                            const dueDateObj = new Date(assign.due_at);
                            const today = new Date(); today.setHours(0,0,0,0);
                            const isOverdue = dueDateObj < today;
                            let dateClass = 'date-future';
                            let urgencyText = `Due: ${dueDateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })}`;
                            if (isOverdue) { 
                                dateClass = 'date-urgent'; 
                                urgencyText = `❗ OVERDUE (was ${dueDateObj.toLocaleDateString()})`; 
                            } else {
                                const daysDiff = Math.ceil((dueDateObj - today) / (1000*60*60*24));
                                if (daysDiff <= 2) { dateClass = 'date-urgent'; urgencyText = `⚠️ URGENT: ${dueDateObj.toLocaleDateString()}`; }
                                else if (daysDiff <= 5) { dateClass = 'date-upcoming'; urgencyText = `📅 Due soon: ${dueDateObj.toLocaleDateString()}`; }
                            }
                            
                            const li = document.createElement('li'); li.className = 'assignment-item';
                            li.innerHTML = `<div class="assignment-info"><span class="assignment-name">${assign.name}</span><div class="assignment-date"><span class="date-badge ${dateClass}">${urgencyText}</span><span class="status-badge">📝 Pending</span></div></div><span class="assignment-score">${assign.points_possible ? `${assign.points_possible} pts` : '—'}</span>`;
                            li.onclick = () => openModal(assign.name, assign.description || "No description", assign.html_url);
                            assignContainer.appendChild(li);
                        });
                    }
                    
                    // Modules & Materials
                    try {
                        const modules = await fetchFromCanvas(`/api/v1/courses/${course.id}/modules?include[]=items&per_page=100`, token, domain);
                        const modContainer = document.getElementById(`modules-list-${course.id}`);
                        modContainer.innerHTML = '';
                        if (!modules || modules.length === 0) modContainer.innerHTML = '<li class="no-data">No modules found.</li>';
                        else {
                            modules.forEach(mod => {
                                const modHeader = document.createElement('li'); modHeader.className = 'module-header'; modHeader.innerText = mod.name; modContainer.appendChild(modHeader);
                                if (mod.items && mod.items.length) {
                                    mod.items.forEach(item => {
                                        const li = document.createElement('li'); li.className = 'module-item';
                                        let niceType = item.type;
                                        if (item.type === 'File') niceType = 'Document';
                                        if (item.type === 'Assignment') niceType = 'Task';
                                        if (item.type === 'Page') niceType = 'Page';
                                        li.innerHTML = `<a href="${item.html_url || '#'}" target="_blank" style="display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit; width:100%;"><span class="module-type">${niceType}</span>${item.title}</a>`;
                                        modContainer.appendChild(li);
                                    });
                                }
                            });
                        }
                    } catch(e) { document.getElementById(`modules-list-${course.id}`).innerHTML = '<li class="no-data">Failed to load modules.</li>'; }
                    
                    // Grades tab
                    const gradedAssignments = allAssignments.filter(a => a.submission && (a.submission.workflow_state === 'graded' || a.submission.score !== null)).sort((a,b) => new Date(b.due_at || 0) - new Date(a.due_at || 0));
                    const gradesContainer = document.getElementById(`grades-list-${course.id}`);
                    gradesContainer.innerHTML = '';
                    if (gradedAssignments.length === 0) gradesContainer.innerHTML = '<li class="no-data">No graded assignments yet.</li>';
                    else {
                        gradedAssignments.forEach(assign => {
                            const sub = assign.submission;
                            const score = sub?.score !== undefined && sub?.score !== null ? sub.score : '—';
                            const possible = assign.points_possible ?? '—';
                            const dueStr = assign.due_at ? new Date(assign.due_at).toLocaleDateString() : 'No due date';
                            const li = document.createElement('li'); li.className = 'assignment-item';
                            li.innerHTML = `<div class="assignment-info"><span class="assignment-name">${assign.name}</span><span class="assignment-date">📅 ${dueStr}</span></div><span class="assignment-score">${score} / ${possible}</span>`;
                            li.onclick = () => openModal(assign.name, assign.description || "Grade details", assign.html_url);
                            gradesContainer.appendChild(li);
                        });
                    }
                }
                
                // Global AI Due Date Analysis - only for future assignments (not overdue)
                if (openRouterKey && allUpcomingAssignments.length > 0) {
                    const coursesGrouped = {};
                    allUpcomingAssignments.forEach(item => {
                        if (!coursesGrouped[item.courseName]) {
                            coursesGrouped[item.courseName] = [];
                        }
                        coursesGrouped[item.courseName].push({
                            name: item.assignmentName,
                            due_at: item.dueDate,
                            points: item.pointsPossible
                        });
                    });
                    
                    const coursesForAI = Object.keys(coursesGrouped).map(courseName => ({
                        name: courseName,
                        upcomingAssignments: coursesGrouped[courseName].sort((a,b) => new Date(a.due_at) - new Date(b.due_at))
                    }));
                    
                    const aiRaw = await getAIDueDateAnalysis(openRouterKey, coursesForAI);
                    if (aiRaw) {
                        const globalAIDiv = document.createElement('div');
                        globalAIDiv.className = 'ai-insight-card';
                        let formattedHtml = `<h4>📅 Upcoming Deadlines (Sorted by Due Date)</h4><ul class="ai-bullets">`;
                        const lines = aiRaw.split('\n');
                        let hasBullets = false;
                        for (let line of lines) {
                            if (line.trim().startsWith('-') || line.trim().startsWith('•') || line.trim().startsWith('*')) {
                                let content = line.replace(/^[-\•*]\s*/, '');
                                content = formatBoldText(content);
                                formattedHtml += `<li>${content}</li>`;
                                hasBullets = true;
                            } else if (line.trim().length > 0 && !line.includes('```')) {
                                const formattedLine = formatBoldText(line.trim());
                                formattedHtml += `<li>${formattedLine}</li>`;
                                hasBullets = true;
                            }
                        }
                        if (!hasBullets && aiRaw.length > 0) {
                            const formatted = formatBoldText(aiRaw.substring(0, 400));
                            formattedHtml += `<li>${formatted}</li>`;
                        }
                        formattedHtml += `</ul>`;
                        globalAIDiv.innerHTML = formattedHtml;
                        const mainViewDiv = document.getElementById('mainView');
                        if (mainViewDiv.firstChild && mainViewDiv.firstChild.id !== 'emptySelection') mainViewDiv.insertBefore(globalAIDiv, mainViewDiv.firstChild);
                        else mainViewDiv.prepend(globalAIDiv);
                    }
                } else if (openRouterKey && allUpcomingAssignments.length === 0) {
                    const noPendingDiv = document.createElement('div');
                    noPendingDiv.className = 'ai-insight-card';
                    noPendingDiv.innerHTML = `<h4>📅 Upcoming Deadlines</h4><ul class="ai-bullets"><li>✅ No upcoming future assignments! Check the Assignments tab for any overdue tasks you may need to complete.</li></ul>`;
                    const mainViewDiv = document.getElementById('mainView');
                    if (mainViewDiv.firstChild && mainViewDiv.firstChild.id !== 'emptySelection') mainViewDiv.insertBefore(noPendingDiv, mainViewDiv.firstChild);
                }
                
                if (courses.length > 0) selectCourse(courses[0].id);
                
            } catch (err) {
                console.error(err);
                errorDiv.innerText = `⚠️ ${err.message}`;
                document.getElementById('controlsCard').style.display = 'block';
            } finally {
                btn.innerText = "Authenticate & Load"; btn.disabled = false;
                loadingBar.style.display = 'none';
            }
        }
        
        function openModal(title, desc, url) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerHTML = desc || "<i>No additional details.</i>";
            document.getElementById('modalSubmitLink').href = url || "#";
            document.getElementById('assignmentModal').style.display = 'flex';
        }
        function closeModal(force) { if (force || event?.target?.id === 'assignmentModal') { document.getElementById('assignmentModal').style.display = 'none'; } }
    </script>
</body>
</html>
